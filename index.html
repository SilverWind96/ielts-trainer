<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IELTS Trainer — Your comprehensive 12-week IELTS preparation companion. Master Reading, Writing, Listening & Speaking with expert strategies, academic vocabulary, and structured study plans.">
  <title>IELTS Trainer — 12-Week Study Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Auth Gate (Login Gate Screen) -->
  <div class="auth-gate" id="auth-gate"></div>

  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🎯</span>
        <div class="logo-text">
          <h1>IELTS Trainer</h1>
          <span class="logo-subtitle">12-Week Companion</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-page="study-plan">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Study Plan</span>
      </a>
      <a href="#" class="nav-item" data-page="vocabulary">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Vocabulary</span>
      </a>
      <a href="#" class="nav-item" data-page="vocab-practice">
        <span class="nav-icon">🎴</span>
        <span class="nav-label">Vocab Practice</span>
      </a>
      <a href="#" class="nav-item" data-page="strategies">
        <span class="nav-icon">🧠</span>
        <span class="nav-label">Strategies</span>
      </a>
      <a href="#" class="nav-item" data-page="resources">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Resources</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="progress-summary" id="sidebar-progress">
        <div class="progress-ring-container">
          <svg class="progress-ring" viewBox="0 0 60 60">
            <circle class="progress-ring-bg" cx="30" cy="30" r="26" />
            <circle class="progress-ring-fill" cx="30" cy="30" r="26" id="sidebar-ring" />
          </svg>
          <span class="progress-ring-text" id="sidebar-progress-text">0%</span>
        </div>
        <div class="progress-info">
          <span class="progress-label">Overall Progress</span>
          <span class="progress-detail" id="sidebar-progress-detail">0 / 0 tasks</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Mobile Menu Toggle -->
  <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Dashboard Page -->
    <section class="page active" id="page-dashboard"></section>

    <!-- Study Plan Page -->
    <section class="page" id="page-study-plan"></section>

    <!-- Vocabulary Page -->
    <section class="page" id="page-vocabulary"></section>

    <!-- Vocabulary Practice Page -->
    <section class="page" id="page-vocab-practice"></section>

    <!-- Strategies Page -->
    <section class="page" id="page-strategies"></section>

    <!-- Resources Page -->
    <section class="page" id="page-resources"></section>
  </main>

  <!-- Task Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="task-modal">
      <div class="modal-header">
        <div class="modal-skill-badge" id="modal-skill-badge"></div>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
